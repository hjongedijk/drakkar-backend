services:
  backend:
    image: ghcr.io/hjongedijk/drakkar-backend:latest
    pull_policy: always
    restart: unless-stopped
    user: 0:0
    init: true
    tty: true
    stdin_open: true
    stop_grace_period: 45s
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - ./data:/data
      # Add :z on SELinux hosts if Docker requires relabeling.
      - /mnt/drakkar:/mnt:rshared
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - drakkar

  frontend:
    image: ghcr.io/hjongedijk/drakkar-frontend:latest
    pull_policy: always
    restart: unless-stopped
    user: 0:0
    init: true
    tty: true
    stdin_open: true
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./data:/data:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - drakkar

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    user: 0:0
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drakkar
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d drakkar"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - drakkar

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    user: 0:0
    command: ["valkey-server", "--appendonly", "no", "--save", "900", "1", "--save", "300", "10", "--save", "60", "10000"]
    volumes:
      - ./valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - drakkar

  valkey-insight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    user: 0:0
    depends_on:
      valkey:
        condition: service_healthy
    ports:
      - "5540:5540"
    volumes:
      - ./valkey-insight-data:/data
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - drakkar

  nzbhydra2:
    image: lscr.io/linuxserver/nzbhydra2:latest
    restart: unless-stopped
    user: 0:0
    depends_on:
      apprise-api:
        condition: service_started
    ports:
      - "5076:5076"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Amsterdam
    volumes:
      - ./nzbhydra2:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5076"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - drakkar

  apprise-api:
    image: caronc/apprise:latest
    restart: unless-stopped
    user: 0:0
    ports:
      - "8000:8000"
    environment:
      - TZ=Europe/Amsterdam
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - drakkar

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    restart: unless-stopped
    user: 0:0
    ports:
      - "5055:5055"
    environment:
      LOG_LEVEL: info
      TZ: Europe/Amsterdam
    volumes:
      - ./seerr-data:/app/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5055/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - drakkar

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    restart: unless-stopped
    user: 0:0
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "6767:6767"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Amsterdam
    volumes:
      - ./bazarr:/config
      - /mnt/drakkar:/mnt:rshared
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6767"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - drakkar

networks:
  drakkar:
    driver: bridge
